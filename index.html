<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CRM de Prevencion de Riesgos para gestionar actas, visitas, observaciones y analitica operacional del SLEP Colchagua."
    />
    <title>CRM Prevencion SLEP Colchagua</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Unregister stale service workers immediately, before React loads -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
